name: Publish to npm

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip if this push was the version-bump commit from CI itself
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git identity
        run: |
          git config --global user.email "mayankrajput8745@gmail.com"
          git config --global user.name "Mayank Rajput"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: npm run patchRelease

      - name: Push version bump and tag
        run: git push --follow-tags origin main

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
